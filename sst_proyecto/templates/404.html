<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — ControlSST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .error-card {
            max-width: 480px;
            margin: 80px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 48px 40px;
            text-align: center;
        }
        .error-number {
            font-size: 5rem;
            font-weight: 700;
            color: #39A900;
            line-height: 1;
        }
        .error-icon { font-size: 3rem; color: #39A900; }
        .btn-sena {
            background-color: #39A900;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 28px;
            font-weight: 600;
        }
        .btn-sena:hover { background-color: #2e8800; color: #fff; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon mb-2">
            <i class="bi bi-search"></i>
        </div>
        <div class="error-number">404</div>
        <h4 class="mt-3 fw-semibold">Página no encontrada</h4>
        <p class="text-muted mt-2">La página que buscas no existe o fue movida.</p>
        <hr>
        <a href="/" class="btn btn-sena mt-2">
            <i class="bi bi-house me-1"></i> Volver al inicio
        </a>
    </div>
</body>
</html>
