{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema SST SENA{% endblock %}</title>
    <!-- Favicon igual al login -->
    <link rel="icon" type="image/svg+xml" href="{% static 'icons/sena_logo_green.svg' %}">
    <meta name="theme-color" content="#39A900">
    <!-- Design System (variables CSS) -->
    <link rel="stylesheet" href="{% static 'css/design-system.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a4d2e 0%, #0d3b1e 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1464207687429-7505649dae38?w=1920&q=80');
            background-size: cover;
            background-position: center;
            filter: blur(3px);
            opacity: 0.3;
            z-index: 0;
        }

        .container-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            width: 100%;
            height: 700px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* ── Panel izquierdo (formulario) ─────────────────────────── */
        .login-panel {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 50%;
            height: 100%;
            background: white;
            z-index: 2;
            overflow-y: auto;
        }

        /* ── Panel derecho (imagen) ────────────────────────────────── */
        .image-panel {
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, rgba(57, 169, 0, 0.9), rgba(26, 77, 46, 0.9));
            position: relative;
        }

        .image-panel::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1464207687429-7505649dae38?w=800&q=80');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            animation: zoomIn 20s ease-in-out infinite alternate;
        }

        @keyframes zoomIn {
            from { transform: scale(1); }
            to   { transform: scale(1.1); }
        }

        /* ── Logo ───────────────────────────────────────────────────── */
        .logo-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .sena-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sena-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Mismo filtro verde #39A900 del login */
            filter: brightness(0) saturate(100%) invert(52%) sepia(96%) saturate(500%) hue-rotate(65deg) brightness(90%);
        }

        h1 {
            font-size: 26px;
            color: #212121;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 0;
        }

        /* ── Alertas de Django messages ─────────────────────────────── */
        .messages-wrapper { margin-bottom: 16px; }

        .alert {
            background: #ffebee;
            border: 1px solid #ffcdd2;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #c62828;
            font-size: 13px;
            animation: shake 0.5s ease;
        }

        .alert.success {
            background: #e8f5e9;
            border-color: #c8e6c9;
            color: #2e7d32;
        }

        .alert.warning {
            background: #fff8e1;
            border-color: #ffe082;
            color: #f57f17;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-8px); }
            75%       { transform: translateX(8px); }
        }

        /* ── Grupos de formulario ───────────────────────────────────── */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .form-group label i { color: #39A900; margin-right: 6px; }

        .input-wrapper { position: relative; transition: all 0.3s ease; }

        .form-group input {
            width: 100%;
            padding: 12px 45px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            color: #333;
            transition: all 0.3s ease;
            background: white;
            outline: none;
            height: 46px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }

        .form-group input::placeholder { color: #999; font-size: 13px; }

        .form-group input:not(:focus):not(:placeholder-shown) {
            border-color: #bdbdbd;
            background: #f9f9f9;
        }

        .form-group input:focus {
            border-color: #39A900;
            background: white;
            box-shadow: 0 0 0 3px rgba(57, 169, 0, 0.1);
            transform: translateY(-1px);
        }

        .input-icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 16px;
            pointer-events: none;
            transition: color 0.3s ease;
            z-index: 2;
        }

        .form-group input:focus ~ .input-icon-left { color: #39A900; }

        /* Errores de campo del form Django */
        .form-group .errorlist {
            list-style: none;
            margin-top: 5px;
            padding: 0;
        }
        .form-group .errorlist li {
            font-size: 12px;
            color: #d32f2f;
        }

        /* Texto de ayuda */
        .help-text {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            display: block;
        }

        /* ── Botón principal ────────────────────────────────────────── */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #39A900, #1a4d2e);
            color: white;
            box-shadow: 0 8px 20px rgba(57, 169, 0, 0.3);
            margin-top: 10px;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(57, 169, 0, 0.4);
            color: white;
        }

        /* ── Enlace volver ──────────────────────────────────────────── */
        .switch-text {
            text-align: center;
            margin-top: 22px;
            font-size: 14px;
            color: #666;
        }

        .switch-text a {
            color: #39A900;
            font-weight: 600;
            text-decoration: none;
        }

        .switch-text a:hover { text-decoration: underline; color: #1a4d2e; }

        /* ── Panel imagen — overlay ─────────────────────────────────── */
        .image-overlay {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: white;
            text-align: center;
            z-index: 2;
        }

        .image-overlay h2 {
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 700;
            color: white !important;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .image-overlay p {
            font-size: 15px;
            opacity: 0.95;
            max-width: 320px;
            line-height: 1.6;
            color: white !important;
        }
        .image-overlay i {
            display: inline-block;
            font-size: 70px;
            margin-bottom: 20px;
            opacity: 0.9;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        .image-overlay .sena-logo {
            width: 110px;
            height: 110px;
            margin-bottom: 20px;
        }

        /* En el panel derecho el logo va en blanco */
        .image-overlay .sena-logo img {
            filter: brightness(0) invert(1);
        }

        /* ── Responsive ─────────────────────────────────────────────── */
        @media (max-width: 968px) {
            .container-wrapper { height: auto; max-width: 100%; }
            .login-wrapper { flex-direction: column; }
            .login-panel { width: 100%; padding: 40px 30px; }
            .image-panel { display: none; }
        }

        @media (max-width: 480px) {
            .login-panel { padding: 30px 20px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <div class="login-wrapper">
            <div class="login-panel">
                <!-- Mensajes de Django (warning, error, success) -->
                {% if messages %}
                <div class="messages-wrapper">
                    {% for message in messages %}
                    <div class="alert {% if message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% endif %}">
                        <i class="bi bi-{% if message.tags == 'success' %}check-circle{% elif message.tags == 'warning' %}clock{% else %}exclamation-triangle{% endif %}-fill"></i>
                        <div>{{ message }}</div>
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                {% block content %}{% endblock %}
            </div>
            <div class="image-panel">
                <div class="image-overlay">
                    {% block image_side %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
