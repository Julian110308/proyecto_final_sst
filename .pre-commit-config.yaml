repos:
  # Ruff: lint + formato (reemplaza flake8, isort, pyupgrade)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--config, sst_proyecto/ruff.toml]
      - id: ruff-format
        args: [--config, sst_proyecto/ruff.toml]

  # Hooks básicos de calidad
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace       # Elimina espacios al final de línea
      - id: end-of-file-fixer         # Asegura salto de línea al final del archivo
      - id: check-merge-conflict      # Detecta marcadores de conflicto git sin resolver
      - id: check-added-large-files   # Bloquea archivos > 500KB accidentales
        args: [--maxkb=500]
      - id: check-yaml                # Valida sintaxis de archivos .yaml
      - id: check-json                # Valida sintaxis de archivos .json

  # Detección de secretos en commits
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: (\.env\.example|requirements.*\.txt|htmlcov|\.sqlite3)
