services:
  # ── Base de datos PostgreSQL ────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-sst_db}
      POSTGRES_USER: ${DB_USER:-sst_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sst_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sst_user} -d ${DB_NAME:-sst_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery + Django Channels) ───────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django + Gunicorn ──────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  # ── Celery worker (tareas en segundo plano) ────────────────
  celery:
    build: .
    restart: unless-stopped
    command: >
      sh -c "celery -A sst_proyecto worker
             --loglevel=info
             --concurrency=2"
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx (proxy reverso + archivos estáticos) ─────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_files:
  media_files:
