name: CI — Proyecto SST Centro Minero SENA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint con Ruff
  # ─────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Ruff
        run: pip install ruff==0.15.6

      - name: Ejecutar Ruff
        run: ruff check sst_proyecto/

  # ─────────────────────────────────────────────
  # JOB 2: Tests + Cobertura
  # ─────────────────────────────────────────────
  tests:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint

    env:
      DJANGO_SETTINGS_MODULE: sst_proyecto.settings
      SECRET_KEY: "ci-secret-key-no-usada-en-produccion"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      VAPID_PUBLIC_KEY: "ci-vapid-public"
      VAPID_PRIVATE_KEY: "ci-vapid-private"
      VAPID_ADMIN_EMAIL: "ci@sena.edu.co"

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Verificar migraciones pendientes
        working-directory: sst_proyecto
        run: python manage.py migrate --check

      - name: Ejecutar tests con cobertura
        working-directory: sst_proyecto
        run: |
          python -m pytest \
            --cov=usuarios \
            --cov=emergencias \
            --cov=control_acceso \
            --cov=reportes \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -q

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: sst_proyecto/coverage.xml

  # ─────────────────────────────────────────────
  # JOB 3: Auditoría de dependencias
  # ─────────────────────────────────────────────
  audit:
    name: Auditoría de dependencias (pip-audit)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: Auditar dependencias
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2023-62
